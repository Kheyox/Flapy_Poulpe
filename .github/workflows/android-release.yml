name: Build & Release APK

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found, relying on local debug.keystore"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute version
        id: version
        run: |
          # versionCode: monotonic, increases every workflow run (Android requires this to upgrade).
          VCODE="${{ github.run_number }}"
          # versionName: the tag for tag pushes (v1.2.3 -> 1.2.3), otherwise 1.0.<run_number>.
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VNAME="${GITHUB_REF_NAME#v}"
          else
            VNAME="1.0.${VCODE}"
          fi
          echo "vname=$VNAME" >> "$GITHUB_OUTPUT"
          echo "vcode=$VCODE"  >> "$GITHUB_OUTPUT"
          echo "Building version $VNAME (code $VCODE)"

      - name: Build APK (Debug Compilation)
        env:
          APP_VERSION_NAME: ${{ steps.version.outputs.vname }}
          APP_VERSION_CODE: ${{ steps.version.outputs.vcode }}
        run: gradle assembleDebug --no-daemon

      - name: Prepare APK Asset
        run: |
          mkdir -p build-assets
          cp app/build/outputs/apk/debug/app-debug.apk \
             build-assets/PoulpeFlappy-v${{ steps.version.outputs.vname }}.apk
          echo "APK prepared: PoulpeFlappy-v${{ steps.version.outputs.vname }}.apk"

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.vname }}
          name: Version ${{ steps.version.outputs.vname }}
          files: build-assets/PoulpeFlappy-*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found, relying on local debug.keystore"
          fi

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build APK (Debug Compilation)
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare APK Asset
        run: |
          mkdir -p build-assets
          VERSION_NAME="${{ github.ref_name }}"
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="latest"
          fi
          cp app/build/outputs/apk/debug/app-debug.apk build-assets/PoulpeFlappy-${VERSION_NAME}.apk
          echo "APK prepared in build-assets/PoulpeFlappy-${VERSION_NAME}.apk"

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: build-assets/PoulpeFlappy-*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
